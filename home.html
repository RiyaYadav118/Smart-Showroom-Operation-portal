<!DOCTYPE html>
<html>
<head>
    <title>MotoHub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

   

<!-- NAVBAR -->
<div class="navbar">
    <h2>🚗 MotoHub</h2>
    <div class="menu">
        <a href="home.html">Home</a>
        <a href="products.html">Products</a>
        <a href="AboutUs.html">About</a>
        <button onclick="showLogin()">Login</button>
    </div>
</div>

<!-- HERO SECTION / SLIDER -->
<div class="hero">
    <img src="images/poonam1.jpeg" class="car-img" id="slider">
    <div class="text-box">
        <h1 id="title">Welcome to MotoHub</h1>
        <p id="subtitle">Your Premium Car Destination</p>
    </div>
    <button class="left" onclick="prevSlide()">❮</button>
    <button class="right" onclick="nextSlide()">❯</button>
</div>

 <!-- LOGIN POPUP -->
 <div id="loginBox" style="display:none;">
    <h3>Login</h3>
    <input type="text" id="username" placeholder="Username"><br>
    <input type="password" id="password" placeholder="Password"><br>
     <button onclick="login()">Submit</button> 
</div> 

 <!-- ADMIN PANEL  -->
<div id="adminPanel" style="display:none;">
    <h2>Admin Panel</h2>
    <form id="carForm">
        <input type="text" id="name" placeholder="Car Name" required><br>
        <i
        input type="text" id="price" placeholder="Price" required><br>
       
        <textarea id="desc" placeholder="Description" required></textarea><br>
        <input type="file" id="image"><br>
        <button type="submit">Add Car</button>
    </form> 

    
</div> 

<header>
        <h1>🚗 Smart Car Dashboard</h1>
    </header>

    <main>
        <div class="dashboard-card">
            <h2>Total Stock</h2>
            <p id="totalStock">0</p>
        </div>

        <div class="dashboard-card">
            <h2>Total Sold</h2>
            <p id="totalSold">0</p>
        </div>

        <div class="dashboard-card">
            <h2>Highest Selling Car</h2>
            <p id="topCar">No sales yet</p>
        </div>
    </main>

   <div class="emi-container">
    <h2>EMI Calculator</h2>

    <!-- Car Dropdown -->
    <select id="carSelect" onchange="setPrice()">
        <option value="">Select Car</option>
    </select>

    <!-- Auto Price -->
    

    <!-- Other Inputs -->
    <input type="number" id="downPayment" placeholder="Down Payment">
    <input type="number" id="interest" placeholder="Interest Rate (%)">
    <input type="number" id="tenure" placeholder="Loan Tenure (months)">

    <!-- Button -->
    <button onclick="calculateEMI()">Calculate EMI</button>

    <!-- Result -->
    <h3 id="result"></h3>
</div> 



<!-- PRODUCTS LIST -->
 <!-- <h1 style="text-align:center;">Our Premium Collection</h1>
<div id="carList"></div>  -->

<script src="function.js"></script>
 <script src="dashboard.js"></script>
 <script src="slider.js"></script>
 
</body>
</html>
