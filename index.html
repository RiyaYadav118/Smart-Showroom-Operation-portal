<!DOCTYPE html>
<html>
<head>
    <title>MotoHub - Login/Signup</title>
    <link rel="stylesheet" href="login.css">
    <style>
        body { font-family: Arial; text-align:center; padding:50px;}
        input, button { padding:10px; margin:5px; width:200px; }
        .formBox { margin-top:20px; border:1px solid #ccc; padding:20px; display:inline-block; }
    </style>
</head>
<body>

<h1>Welcome to MotoHub</h1>

<!-- SIGNUP POPUP -->
<div id="signupBox" class="formBox">
    <h3>Signup</h3>
    <input type="text" id="signupUsername" placeholder="Username"><br>
    <input type="email" id="signupEmail" placeholder="Email"><br>
    <input type="password" id="signupPassword" placeholder="Password"><br>
    <input type="password" id="signupConfirm" placeholder="Confirm Password"><br>
    <button onclick="signup()">Signup</button>
</div>

<!-- LOGIN POPUP -->
<div id="loginBox" class="formBox" style="display:none;">
    <h3>Login</h3>
    <input type="text" id="loginUsername" placeholder="Username"><br>
    <input type="password" id="loginPassword" placeholder="Password"><br>
    <button onclick="login()">Submit</button>
</div>

<div style="margin-top:20px;">
    <button onclick="showLogin()">Already have account? Login</button>
    <button onclick="showSignup()">New user? Signup</button>
</div>

<script>
// Show login/signup forms
function showLogin() {
    document.getElementById('loginBox').style.display = 'block';
    document.getElementById('signupBox').style.display = 'none';
}

function showSignup() {
    document.getElementById('signupBox').style.display = 'block';
    document.getElementById('loginBox').style.display = 'none';
}

// Signup function
function signup() {
    let username = document.getElementById('signupUsername').value.trim();
    let email = document.getElementById('signupEmail').value.trim();
    let password = document.getElementById('signupPassword').value.trim();
    let confirm = document.getElementById('signupConfirm').value.trim();

    if(!username || !email || !password || !confirm){
        alert('All fields are required');
        return;
    }
    if(password !== confirm){
        alert('Passwords do not match');
        return;
    }

    let users = JSON.parse(localStorage.getItem('users') || '[]');

    // Check if username/email already exists
    if(users.some(u => u.username === username)){
        alert('Username already taken');
        return;
    }
    if(users.some(u => u.email === email)){
        alert('Email already registered');
        return;
    }

    // Save new user
    let newUser = {username, email, password};
    users.push(newUser);
    localStorage.setItem('users', JSON.stringify(users));

    // Set currentUser and redirect to home.html
    localStorage.setItem('currentUser', JSON.stringify(newUser));
    window.location.href = 'home.html';
}

// Login function
function login() {
    let username = document.getElementById('loginUsername').value.trim();
    let password = document.getElementById('loginPassword').value.trim();
    let users = JSON.parse(localStorage.getItem('users') || '[]');

    // Admin login
    if(username === 'admin' && password === '123'){
        localStorage.setItem('currentUser', JSON.stringify({username:'admin', role:'admin'}));
        window.location.href = 'products.html'; // admin redirected to products page
        return;
    }

    // Normal user login
    let user = users.find(u => u.username === username && u.password === password);
    if(user){
        localStorage.setItem('currentUser', JSON.stringify(user));
        window.location.href = 'home.html'; // normal user redirected to home page
    } else {
        alert('Invalid username or password');
    }
}
</script>

</body>
</html>
